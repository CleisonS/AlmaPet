<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#09090b" />
  <meta
    name="description"
    content="Estamos preparando novidades. Em breve, uma nova experiência estará disponível."
  />
  <title>Em breve — Novidades</title>

  <style>
    :root {
      --background: #09090b;
      --surface: rgba(255, 255, 255, 0.055);
      --surface-border: rgba(255, 255, 255, 0.10);
      --text: #fafafa;
      --muted: #a1a1aa;
      --accent: #8b5cf6;
      --accent-secondary: #22d3ee;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      color-scheme: dark;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.16), transparent 32%),
        radial-gradient(circle at 80% 75%, rgba(34, 211, 238, 0.11), transparent 30%),
        var(--background);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
    }

    .ambient {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      filter: blur(100px);
      opacity: 0.22;
      pointer-events: none;
      animation: float 9s ease-in-out infinite alternate;
    }

    .ambient-one {
      top: -180px;
      left: -100px;
      background: var(--accent);
    }

    .ambient-two {
      right: -160px;
      bottom: -180px;
      background: var(--accent-secondary);
      animation-delay: -3s;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 680px);
      padding: clamp(32px, 6vw, 64px);
      border: 1px solid var(--surface-border);
      border-radius: 28px;
      background: linear-gradient(
        145deg,
        rgba(255, 255, 255, 0.075),
        rgba(255, 255, 255, 0.025)
      );
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      text-align: center;
      animation: reveal 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 38px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      box-shadow: 0 0 24px rgba(139, 92, 246, 0.65);
      animation: pulse 2s ease-in-out infinite;
    }

    .loader {
      position: relative;
      width: 86px;
      height: 86px;
      margin: 0 auto 34px;
    }

    .loader::before,
    .loader::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .loader::before {
      border: 2px solid rgba(255, 255, 255, 0.10);
    }

    .loader::after {
      border: 2px solid transparent;
      border-top-color: var(--accent-secondary);
      border-right-color: var(--accent);
      filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.45));
      animation: spin 1.1s linear infinite;
    }

    .loader-core {
      position: absolute;
      inset: 18px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .loader-core span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.75);
      animation: corePulse 1.4s ease-in-out infinite;
    }

    h1 {
      max-width: 560px;
      margin: 0 auto;
      font-size: clamp(2.5rem, 7vw, 5.3rem);
      line-height: 0.98;
      letter-spacing: -0.065em;
      font-weight: 800;
    }

    h1 span {
      display: block;
      margin-top: 10px;
      background: linear-gradient(90deg, #ffffff 10%, #c4b5fd 50%, #67e8f9 90%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .description {
      max-width: 500px;
      margin: 26px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.12rem);
      line-height: 1.75;
    }

    .progress-area {
      margin-top: 38px;
    }

    .progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      color: #d4d4d8;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .progress-track {
      position: relative;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      box-shadow: 0 0 22px rgba(34, 211, 238, 0.36);
      animation: progress 5s ease-in-out infinite;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-top: 28px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      color: #d4d4d8;
      font-size: 0.84rem;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 12px rgba(52, 211, 153, 0.75);
      animation: pulse 1.8s ease-in-out infinite;
    }

    footer {
      position: fixed;
      bottom: 18px;
      left: 50%;
      z-index: 2;
      transform: translateX(-50%);
      width: max-content;
      max-width: calc(100% - 32px);
      color: rgba(161, 161, 170, 0.7);
      font-size: 0.78rem;
      text-align: center;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 0.55;
        transform: scale(0.92);
      }
      50% {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    @keyframes corePulse {
      0%,
      100% {
        transform: scale(0.75);
        opacity: 0.65;
      }
      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @keyframes progress {
      0% {
        width: 8%;
      }
      50% {
        width: 82%;
      }
      100% {
        width: 8%;
      }
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes float {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }
      to {
        transform: translate3d(45px, 35px, 0) scale(1.12);
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 16px;
      }

      .card {
        border-radius: 22px;
      }

      .brand {
        margin-bottom: 30px;
      }

      .loader {
        width: 74px;
        height: 74px;
      }

      footer {
        bottom: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main class="page">
    <section class="card" aria-labelledby="page-title">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Nova experiência</span>
      </div>

      <div class="loader" aria-label="Carregando">
        <div class="loader-core">
          <span></span>
        </div>
      </div>

      <h1 id="page-title">
        Estamos preparando
        <span>algo novo.</span>
      </h1>

      <p class="description">
        Uma nova experiência está sendo construída nos mínimos detalhes.
        Em breve, novidades.
      </p>

      <div class="progress-area" aria-hidden="true">
        <div class="progress-meta">
          <span>Preparando lançamento</span>
          <span id="progress-text">Carregando</span>
        </div>

        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
      </div>

      <div class="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span>Projeto em desenvolvimento</span>
      </div>
    </section>
  </main>

  <footer>
    <span id="year"></span> — Todos os direitos reservados.
  </footer>

  <script>
    const yearElement = document.getElementById("year");
    const progressText = document.getElementById("progress-text");
    const loadingStates = ["Carregando", "Carregando.", "Carregando..", "Carregando..."];

    yearElement.textContent = new Date().getFullYear();

    let stateIndex = 0;

    setInterval(() => {
      stateIndex = (stateIndex + 1) % loadingStates.length;
      progressText.textContent = loadingStates[stateIndex];
    }, 550);
  </script>
</body>
</html>
